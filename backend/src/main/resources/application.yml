server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/edu_ai_community?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 5000ms

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

app:
  jwt:
    secret: d2VsY29tZS10by1lZHUtYWktY29tbXVuaXR5LXNlY3JldC1rZXktMjAyNC1mb3Itand0LXNpZ25pbmc=
    access-token-expiration: 7200000
    refresh-token-expiration: 604800000

  cors:
    allowed-origins: http://localhost:5173

  qwen:
    base-url: http://localhost:8000/v1
    model: Qwen3-32B
    api-key: not-needed
    max-tokens: 1024
    temperature: 0.7
    enabled: false
